<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Fitora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .password-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .btn-reset {
            background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            color: white;
            font-weight: 600;
        }
        .strength-bar {
            height: 5px;
            border-radius: 5px;
            transition: all 0.3s;
        }
    </style>
</head>
<body>

<div class="password-card">
    <div class="text-center mb-4">
        <i class="fas fa-lock fa-3x text-success mb-3"></i>
        <h3>Set New Password</h3>
        <p class="text-muted">Create a strong password for your account</p>
    </div>
    
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
    
    <form method="POST" id="passwordForm">
        {% csrf_token %}
        
        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-key"></i></span>
                <input type="password" name="password" id="newPassword" class="form-control" placeholder="New Password" required>
            </div>
            <div class="strength-bar mt-2" id="strengthBar"></div>
            <small id="strengthText" class="text-muted"></small>
        </div>
        
        <div class="mb-3">
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-check-circle"></i></span>
                <input type="password" name="confirm_password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
            </div>
        </div>
        
        <button type="submit" class="btn-reset">
            <i class="fas fa-save me-2"></i> Reset Password
        </button>
    </form>
    
    <div class="text-center mt-4">
        <a href="{% url 'customer:login' %}" class="text-decoration-none">
            <i class="fas fa-arrow-left me-1"></i> Back to Login
        </a>
    </div>
</div>

<script>
    const newPass = document.getElementById('newPassword');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');
    
    newPass.addEventListener('input', function() {
        let val = this.value;
        let strength = 0;
        
        if (val.length >= 8) strength++;
        if (/[A-Z]/.test(val)) strength++;
        if (/[0-9]/.test(val)) strength++;
        if (/[^A-Za-z0-9]/.test(val)) strength++;
        
        if (strength === 1) {
            strengthBar.style.width = '25%';
            strengthBar.style.backgroundColor = '#dc3545';
            strengthText.innerText = 'Weak';
        } else if (strength === 2) {
            strengthBar.style.width = '50%';
            strengthBar.style.backgroundColor = '#ffc107';
            strengthText.innerText = 'Medium';
        } else if (strength === 3) {
            strengthBar.style.width = '75%';
            strengthBar.style.backgroundColor = '#17a2b8';
            strengthText.innerText = 'Strong';
        } else if (strength === 4) {
            strengthBar.style.width = '100%';
            strengthBar.style.backgroundColor = '#28a745';
            strengthText.innerText = 'Very Strong';
        } else {
            strengthBar.style.width = '0%';
            strengthText.innerText = '';
        }
    });
    
    document.getElementById('passwordForm').addEventListener('submit', function(e) {
        let pwd = document.getElementById('newPassword').value;
        let confirm = document.getElementById('confirmPassword').value;
        
        if (pwd !== confirm) {
            e.preventDefault();
            alert('Passwords do not match!');
        } else if (pwd.length < 8) {
            e.preventDefault();
            alert('Password must be at least 8 characters!');
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
