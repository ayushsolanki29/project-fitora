{% extends 'customer/base.html' %}
{% load static %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        
        <h4 class="card-title text-center mb-4">Change Password</h4>
        
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
        
        <form method="POST" id="passwordForm">
          {% csrf_token %}
          
          <div class="form-group mb-3">
            <label>Current Password</label>
            <input type="password" name="old_password" class="form-control" required>
          </div>
          
          <div class="form-group mb-3">
            <label>New Password</label>
            <input type="password" name="new_password" id="new_password" class="form-control" required>
            <div class="progress mt-2" style="height: 5px;">
              <div id="strengthBar" class="progress-bar"></div>
            </div>
            <small id="strengthText" class="text-muted"></small>
          </div>
          
          <div class="form-group mb-3">
            <label>Confirm Password</label>
            <input type="password" name="confirm_password" id="confirm_password" class="form-control" required>
            <small id="matchError" class="text-danger"></small>
          </div>
          
          <button type="submit" class="btn btn-primary w-100">
            <i class="mdi mdi-lock-reset"></i> Update Password
          </button>
          
        </form>
        
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById("new_password").addEventListener("input", function() {
  let val = this.value;
  let strength = 0;
  
  if (val.length >= 8) strength++;
  if (/[A-Z]/.test(val)) strength++;
  if (/[0-9]/.test(val)) strength++;
  if (/[^A-Za-z0-9]/.test(val)) strength++;
  
  let bar = document.getElementById("strengthBar");
  let text = document.getElementById("strengthText");
  
  let width = ["25%", "50%", "75%", "100%"][strength-1] || "0%";
  bar.style.width = width;
  
  let labels = ["Weak", "Fair", "Good", "Strong"];
  text.innerText = labels[strength-1] || "";
  
  let colors = ["bg-danger", "bg-warning", "bg-info", "bg-success"];
  bar.className = "progress-bar " + (colors[strength-1] || "");
});

document.getElementById("passwordForm").addEventListener("submit", function(e){
  let newPass = document.getElementById("new_password").value;
  let confirmPass = document.getElementById("confirm_password").value;
  
  if(newPass !== confirmPass){
    e.preventDefault();
    document.getElementById("matchError").innerText = "Passwords do not match!";
  }
});
</script>

{% endblock %}
