<!DOCTYPE html>
<html>
<head>
    <title>FITORA Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, rgba(10,20,40,0.9), rgba(10,20,40,0.8)),
                        url('https://images.unsplash.com/photo-1593030761757-71fae45fa0e7') center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .login-box h2 { text-align: center; margin-bottom: 25px; font-weight: bold; }
        .form-control { margin-bottom: 15px; border-radius: 8px; }
        .btn-login {
            width: 100%;
            background: #c49a6c;
            color: white;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }
        .btn-login:hover { background: #a67c52; color: white; }
        .extra-links { text-align: center; margin-top: 15px; font-size: 14px; }
        .extra-links a { color: #c49a6c; text-decoration: none; }
        .logo { text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">FITORA</div>
    <div class="subtitle">Smart Tailoring Management System</div>
    <h2>Login</h2>

    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">{{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'website:login' %}">
        {% csrf_token %}
        <input type="email" name="email" class="form-control" placeholder="Enter Email" required>
        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
        <button type="submit" class="btn-login">Login</button>
    </form>

    <div class="extra-links">
        <p><a href="{% url 'customer:forget_password' %}">Forgot Password?</a></p>
        <p>Don't have an account? <a href="{% url 'website:register' %}">Register</a></p>
        <p class="mt-2"><a href="{% url 'website:index' %}">← Back to Home</a></p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% include 'includes/fitora_chatbot.html' %}

</body>
</html>
