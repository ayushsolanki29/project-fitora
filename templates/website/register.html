<!DOCTYPE html>
<html>
<head>
    <title>FITORA Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, rgba(10,20,40,0.9), rgba(10,20,40,0.8)),
                        url('https://images.unsplash.com/photo-1593030761757-71fae45fa0e7') center/cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-box {
            background: white;
            padding: 35px;
            border-radius: 15px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .logo { text-align: center; font-size: 24px; font-weight: bold; }
        .subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 20px; }
        h2 { text-align: center; margin-bottom: 20px; font-weight: bold; }
        .form-control, .form-select { margin-bottom: 12px; border-radius: 8px; }
        .btn-register {
            width: 100%;
            background: #c49a6c;
            color: white;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }
        .btn-register:hover { background: #a67c52; color: white; }
        .extra-links { text-align: center; margin-top: 15px; font-size: 14px; }
        .extra-links a { color: #c49a6c; text-decoration: none; }
    </style>
</head>
<body>
<div class="register-box">
    <div class="logo">FITORA</div>
    <div class="subtitle">Smart Tailoring Management System</div>
    <h2>Create Account</h2>

    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'website:register' %}">
        {% csrf_token %}
        <input type="text" name="username" class="form-control" placeholder="Full Name / Username" required>
        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        <input type="tel" name="mobile" class="form-control" placeholder="Phone Number" required>
        <select name="role" class="form-select" required>
            <option value="customer">Customer</option>
            <option value="tailor">Tailor</option>
        </select>
        <input type="password" name="password" class="form-control" placeholder="Create Password" required>
        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
        <button type="submit" class="btn-register">Register</button>
    </form>

    <div class="extra-links">
        Already have an account? <a href="{% url 'website:login' %}">Login</a>
    </div>
</div>
</body>
</html>
