<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Fitora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .verify-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .otp-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 10px;
        }
        .btn-verify {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            width: 100%;
            color: white;
        }
    </style>
</head>
<body>

<div class="verify-card">
    <div class="text-center mb-4">
        <i class="fas fa-shield-alt fa-3x text-primary mb-3"></i>
        <h3>Verify OTP</h3>
        <p class="text-muted">Enter the 6-digit code sent to your email</p>
    </div>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="mb-3">
            <input type="text" name="otp" class="form-control otp-input" 
                   placeholder="000000" maxlength="6" required
                   style="font-size: 24px; letter-spacing: 5px; text-align: center;">
        </div>
        
        <button type="submit" class="btn-verify">
            <i class="fas fa-check-circle me-2"></i> Verify OTP
        </button>
    </form>
    
    <div class="text-center mt-4">
        <a href="{% url 'adminsite:forgot_password' %}" class="text-decoration-none">
            <i class="fas fa-redo me-1"></i> Resend OTP
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
