{% extends 'adminsite/base.html' %}
{% load static %}

{% block content %}

<style>
.profile-card {
  border-radius: 14px;
  border: none;
}
.profile-img-preview {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #e5e7eb;
}
.form-label {
  font-weight: 500;
}
</style>

<div class="row">

  <!-- 👤 LEFT SIDE PROFILE PREVIEW -->
  <div class="col-md-4 grid-margin stretch-card">
    <div class="card shadow-sm profile-card text-center">
      <div class="card-body">

        <img id="previewImage"
             src="{{ request.user.profile_pic.url|default:'/static/admin/images/faces/face1.jpg' }}"
             class="profile-img-preview mb-3">

        <h5>{{ request.user.get_full_name }}</h5>
        <small class="text-muted">Administrator</small>

        <div class="mt-3">
          <span class="badge bg-success">Active</span>
        </div>

        <hr>

        <small class="text-muted">Profile updates will reflect immediately.</small>

      </div>
    </div>
  </div>

  <!-- ✏️ RIGHT SIDE FORM -->
  <div class="col-md-8 grid-margin stretch-card">
    <div class="card shadow-sm profile-card">
      <div class="card-body">

        <h4 class="card-title">Update Account Details</h4>
        <p class="text-muted">Modify your personal information</p>

        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <!-- Username -->
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" value="{{ user.username }}" disabled>
          </div>

          <!-- Name -->
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">First Name</label>
              <input type="text" name="first_name" class="form-control"
                     value="{{ user.first_name }}" required>
            </div>

            <div class="col-md-6 mb-3">
              <label class="form-label">Last Name</label>
              <input type="text" name="last_name" class="form-control"
                     value="{{ user.last_name }}" required>
            </div>
          </div>

          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control"
                   value="{{ user.email }}" required>
          </div>

          <!-- Phone (optional but real-world) -->
          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text" name="phone" class="form-control"
                   value="{{ request.user.phone|default:'' }}">
          </div>

          <!-- Profile Image -->
          <div class="mb-4">
            <label class="form-label">Profile Picture</label>
            <input type="file" name="profile_pic" class="form-control"
                   onchange="previewFile(event)">
          </div>

          <!-- ACTION BUTTONS -->
          <div class="d-flex gap-2">

            <button type="submit" class="btn btn-primary">
              <i class="mdi mdi-content-save"></i> Save Changes
            </button>

            <a href="{% url 'adminsite:view_profile' %}" 
               class="btn btn-light">
              Cancel
            </a>

          </div>

        </form>

      </div>
    </div>
  </div>

</div>

<!-- 🔥 IMAGE PREVIEW SCRIPT -->
<script>
function previewFile(event) {
  const reader = new FileReader();
  reader.onload = function(){
    const output = document.getElementById('previewImage');
    output.src = reader.result;
  };
  reader.readAsDataURL(event.target.files[0]);
}
</script>

{% endblock %}
