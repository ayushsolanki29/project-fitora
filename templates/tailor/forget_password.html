<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .forgot-container {
            max-width: 400px;
            margin: 80px auto;
        }

        .forgot-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .forgot-title {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            font-weight: 600;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 5px rgba(0,123,255,0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #0056b3;
        }

        .error {
            margin-top: 15px;
            color: red;
            font-size: 14px;
        }

        .success {
            margin-top: 15px;
            color: green;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="forgot-container">

    <div class="forgot-card">

        <h2 class="forgot-title">Forgot Password</h2>

<form method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="Enter your email" required>
    </div>

    <button type="submit">Send OTP</button>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
</form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}

    </div>

</div>

</body>
</html>
