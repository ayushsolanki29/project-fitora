{% extends 'tailor/base.html' %}

{% block content %}

<div class="row">
  <div class="col-lg-12 grid-margin stretch-card">

    <div class="card shadow-sm">
      <div class="card-body">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h4 class="card-title mb-1">Create New Order</h4>
            <p class="text-muted mb-0">Add a new tailoring request for your customer.</p>
          </div>

          <a href="#" class="btn btn-light">
            <i class="mdi mdi-arrow-left"></i> Back
          </a>
        </div>

        <hr>

        <!-- FORM -->
        <form method="POST" id="orderForm">
          {% csrf_token %}

          <!-- CUSTOMER + GARMENT -->
          <div class="row">

            <div class="col-md-6 form-group mb-3">
              <label class="form-label">Select Customer *</label>
              <select class="form-control" name="customer" required>
                <option value="">-- Choose Customer --</option>
                {% for customer in customers %}
                  <option value="{{ customer.id }}">
                    {{ customer.get_full_name }} ({{ customer.phone_number }})
                  </option>
                {% endfor %}
              </select>
            </div>

            <div class="col-md-6 form-group mb-3">
              <label class="form-label">Garment Type *</label>
              <input type="text" class="form-control" name="garment_type"
                     placeholder="e.g. Blazer, Lehenga, Shirt" required>
            </div>

          </div>

          <!-- PRICE + DATE + SOURCE -->
          <div class="row">

            <div class="col-md-4 form-group mb-3">
              <label class="form-label">Price (₹)</label>
              <input type="number" step="0.01" class="form-control" 
                     name="price" id="price" placeholder="Enter amount">
              <small id="priceError" class="text-danger"></small>
            </div>

            <div class="col-md-4 form-group mb-3">
              <label class="form-label">Delivery Date *</label>
              <input type="date" class="form-control" 
                     name="delivery_date" id="delivery_date" required>
              <small id="dateError" class="text-danger"></small>
            </div>

            <div class="col-md-4 form-group mb-3">
              <label class="form-label">Fabric Source</label>
              <select class="form-control" name="fabric_source">
                <option value="customer">Customer Provided</option>
                <option value="shop">Shop Inventory</option>
              </select>
            </div>

          </div>

          <!-- EXTRA SETTINGS -->
          <div class="row">

            <div class="col-md-6 form-group mb-3">
              <label class="form-label">Priority</label>
              <select class="form-control" name="priority">
                <option value="Normal">Normal</option>
                <option value="Urgent">Urgent</option>
                <option value="High">High Priority</option>
              </select>
            </div>

            <div class="col-md-6 form-group mb-3">
              <label class="form-label">Initial Status</label>
              <select class="form-control" name="status">
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
              </select>
            </div>

          </div>

          <!-- NOTES -->
          <div class="form-group mb-3">
            <label class="form-label">Design Instructions</label>
            <textarea class="form-control" name="notes" rows="4"
              placeholder="Mention design, stitching type, collar, fitting, etc."></textarea>
          </div>

          <!-- ACTIONS -->
          <div class="d-flex justify-content-end mt-4">
            <button type="reset" class="btn btn-light me-2">Reset</button>
            <button type="submit" class="btn btn-primary">
              <i class="mdi mdi-content-save"></i> Create Order
            </button>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>

<!-- 🔥 VALIDATION SCRIPT -->
<script>
document.getElementById("orderForm").addEventListener("submit", function(e){

  let price = document.getElementById("price").value;
  let date = document.getElementById("delivery_date").value;

  let today = new Date().toISOString().split("T")[0];

  let priceError = document.getElementById("priceError");
  let dateError = document.getElementById("dateError");

  let valid = true;

  // Price validation
  if (price && price <= 0) {
    priceError.innerText = "Price must be greater than 0";
    valid = false;
  } else {
    priceError.innerText = "";
  }

  // Date validation
  if (date < today) {
    dateError.innerText = "Delivery date cannot be in the past";
    valid = false;
  } else {
    dateError.innerText = "";
  }

  if (!valid) {
    e.preventDefault();
  }

});
</script>

{% endblock %}
