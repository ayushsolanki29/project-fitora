<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .container {
            max-width: 400px;
            margin: 80px auto;
        }

        .card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            font-weight: 600;
            color: #555;
            display: block;
            margin-bottom: 5px;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #28a745;
            outline: none;
            box-shadow: 0 0 5px rgba(40,167,69,0.3);
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #1e7e34;
        }

        .message {
            margin-top: 15px;
            font-size: 14px;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <h2>Set New Password</h2>

        <form method="POST">
    {% csrf_token %}

    <div>
        <label>New Password</label>
        <input type="password" name="password" placeholder="Enter new password" required>
    </div>

    <div>
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" placeholder="Confirm password" required>
    </div>

    <button type="submit">Set Password</button>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
</form>

        {% if error %}
            <div class="message error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="message success">{{ success }}</div>
        {% endif %}

    </div>

</div>

</body>
</html>
